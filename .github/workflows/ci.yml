# SPDX-License-Identifier: LGPL-2.1
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format-21
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/noble/ llvm-toolchain-noble-21 main" | sudo tee /etc/apt/sources.list.d/llvm-21.list
          sudo apt-get update
          sudo apt-get install -y clang-format-21

      - name: Check clang-format
        run: |
          find lib test -name "*.cpp" -o -name "*.h" \
            | xargs clang-format-21 --dry-run --Werror

  build-linux:
    runs-on: ubuntu-latest
    env:
      OPENSC_VERSION: '0.26.1'
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpcsclite-dev libssl-dev zlib1g-dev \
            pkg-config autoconf automake libtool \
            cmake ninja-build

      - name: Build OpenSC ${{ env.OPENSC_VERSION }} from source
        run: |
          git clone --branch ${{ env.OPENSC_VERSION }} --depth 1 \
            https://github.com/OpenSC/OpenSC /tmp/opensc-src
          cd /tmp/opensc-src
          ./bootstrap
          ./configure --prefix=/tmp/opensc-install \
            --enable-shared --disable-static --without-readline
          make -j$(nproc) install

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_PREFIX_PATH=/tmp/opensc-install \
            -DOPENSC_INCLUDE_DIR=/tmp/opensc-src/src
          cmake --build build

      - name: Test
        run: ctest --output-on-failure --test-dir build/test

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja opensc

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja
          cmake --build build

      - name: Test
        run: ctest --output-on-failure --test-dir build/test
