# SPDX-License-Identifier: LGPL-2.1
name: Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      opensc_version:
        description: 'OpenSC version to build driver against (e.g. 0.26.1)'
        required: false
        default: '0.26.1'

env:
  OPENSC_VERSION: ${{ inputs.opensc_version || '0.26.1' }}

jobs:
  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev cmake ninja-build libopensc-dev

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja -DREQUIRE_OPENSC_PLUGIN=ON
          cmake --build build

      - name: Test
        run: ctest --output-on-failure --test-dir build/test

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools
        run: brew install ninja opensc

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja -DREQUIRE_OPENSC_PLUGIN=ON
          cmake --build build

      - name: Test
        run: ctest --output-on-failure --test-dir build/test

  cardedge-opensc-linux:
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpcsclite-dev libssl-dev zlib1g-dev \
            pkg-config autoconf automake libtool \
            cmake ninja-build

      - name: Clone & build OpenSC ${{ env.OPENSC_VERSION }}
        run: |
          git clone --branch ${{ env.OPENSC_VERSION }} --depth 1 \
            https://github.com/OpenSC/OpenSC /tmp/opensc-src
          cd /tmp/opensc-src
          ./bootstrap
          ./configure --prefix=/tmp/opensc-install \
            --enable-shared --disable-static --without-readline
          make -j$(nproc) install

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_PREFIX_PATH=/tmp/opensc-install \
            -DBUILD_CARDEDGE_OPENSC_DRIVER=ON \
            -DOPENSC_INCLUDE_DIR=/tmp/opensc-src/src
          cmake --build build --target librescrs-cardedge-opensc

      - name: Package
        run: |
          TAG="${{ github.ref_name }}"
          PKG="librescrs-cardedge-opensc-${TAG}-opensc${{ env.OPENSC_VERSION }}-linux-x86_64"
          mkdir -p "$PKG"
          cp build/lib/cardedge-opensc-driver/librescrs-cardedge-opensc.so "$PKG/"
          cp lib/cardedge-opensc-driver/conf/librescrs.conf "$PKG/"
          cp lib/cardedge-opensc-driver/README.md "$PKG/"
          tar czf "${PKG}.tar.gz" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: cardedge-opensc-linux
          path: librescrs-cardedge-opensc-*.tar.gz

  cardedge-opensc-macos:
    needs: test-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: brew install ninja opensc

      - name: Clone OpenSC ${{ env.OPENSC_VERSION }} headers
        run: |
          git clone --branch ${{ env.OPENSC_VERSION }} --depth 1 \
            https://github.com/OpenSC/OpenSC /tmp/opensc-src

      - name: Configure & Build
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DBUILD_CARDEDGE_OPENSC_DRIVER=ON \
            -DOPENSC_INCLUDE_DIR=/tmp/opensc-src/src
          cmake --build build --target librescrs-cardedge-opensc

      - name: Package
        run: |
          TAG="${{ github.ref_name }}"
          PKG="librescrs-cardedge-opensc-${TAG}-opensc${{ env.OPENSC_VERSION }}-macos-arm64"
          mkdir -p "$PKG"
          cp build/lib/cardedge-opensc-driver/librescrs-cardedge-opensc.dylib "$PKG/"
          cp lib/cardedge-opensc-driver/conf/librescrs.conf "$PKG/"
          cp lib/cardedge-opensc-driver/README.md "$PKG/"
          zip -r "${PKG}.zip" "$PKG"

      - uses: actions/upload-artifact@v4
        with:
          name: cardedge-opensc-macos
          path: librescrs-cardedge-opensc-*.zip

  cardedge-pkcs11-linux:
    needs: test-linux
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libpcsclite-dev cmake ninja-build

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF
          cmake --build build --target librescrs-cardedge-pkcs11

      - name: Package
        run: scripts/linux/build-cardedge-pkcs11-tar.sh build

      - uses: actions/upload-artifact@v4
        with:
          name: cardedge-pkcs11-linux
          path: LibreSCRS-cardedge-pkcs11-*.tar.gz

  cardedge-pkcs11-macos:
    needs: test-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: brew install ninja

      - name: Build
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64 -DBUILD_TESTING=OFF
          cmake --build build --target librescrs-cardedge-pkcs11

      - name: Package
        run: scripts/macos/build-cardedge-pkcs11-zip.sh build

      - uses: actions/upload-artifact@v4
        with:
          name: cardedge-pkcs11-macos
          path: LibreSCRS-cardedge-pkcs11-*.zip

  release:
    needs: [test-linux, test-macos, cardedge-opensc-linux, cardedge-opensc-macos, cardedge-pkcs11-linux, cardedge-pkcs11-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: '*'
          merge-multiple: true
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
