# librescrs.conf — OpenSC configuration snippet for the LibreSCRS card driver.
#
# Add this block to your opensc.conf:
#   Linux:   ~/.config/opensc/opensc.conf  or  /etc/opensc/opensc.conf
#   macOS:   ~/Library/Application Support/OpenSC/opensc.conf
#            or  /Library/Application Support/OpenSC/opensc.conf
#
# Two entries are required:
#   1. card_driver librescrs  — tells OpenSC how to claim and operate the card
#   2. framework pkcs15 / emulate librescrs — tells OpenSC how to read PKCS#15
#      objects (certificates, private keys) from the CardEdge filesystem
#
# Both entries point to the SAME shared library.
#
# Adjust the module path to wherever the built shared library is installed.

app default {
    # List "librescrs" before "internal" so it claims the card first.
    card_drivers = librescrs, internal;

    card_driver librescrs {
        # Linux:
        module = /usr/local/lib/librescrs-opensc.so;

        # macOS (uncomment and adjust):
        # module = /usr/local/lib/librescrs-opensc.dylib;
    }

    framework pkcs15 {
        # PKCS#15 emulation for the CardEdge (mscp/cmapfile) filesystem.
        emulate librescrs {
            # Linux:
            module = /usr/local/lib/librescrs-opensc.so;

            # macOS (uncomment and adjust):
            # module = /usr/local/lib/librescrs-opensc.dylib;
        }
    }
}
